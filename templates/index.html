{% extends "base.html" %}

{% block content %}
{% if username and user %}
    <div class="card">
        <h2 class="card-title">欢迎回来，{{ username }}！</h2>
        <p class="card-text">当前角色：{{ user["role"] }}</p>
        <a href="/logout" class="btn btn-secondary">退出登录</a>
    </div>
{% else %}
    <div class="card">
        <h2 class="card-title">请先登录</h2>
        <p class="card-text">您尚未登录，请先登录系统以查看用户信息。</p>
        <a href="/login" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
