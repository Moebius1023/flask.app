========== 帮助中心 ==========

一、平台功能说明

  1. 用户登录 - 使用用户名和密码登录系统。
  2. 用户注册 - 新用户可在线注册账号。
  3. 个人中心 - 查看个人资料和账户余额。
  4. 余额充值 - 在个人中心页面进行余额充值。
  5. 头像上传 - 上传个人头像图片。
  6. 用户搜索 - 通过用户名或邮箱搜索其他用户。


二、常见问题

  Q: 如何修改密码？
  A: 请联系管理员进行密码重置。

  Q: 充值未到账怎么办？
  A: 请刷新页面或联系客服处理。

  Q: 上传头像有什么限制？
  A: 支持 JPG、PNG、GIF、WEBP 格式的图片文件。
